name: Periodic Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

jobs:
  refresh-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.1"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('dplyr','ggplot2','readr','tidyr'), repos='https://cloud.r-project.org')"

      - name: Run refresh and validation pipeline
        run: |
          python scripts/refresh_pipeline.py --horizon 5

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: care-cast-bc-reports
          path: |
            outputs/reports
            outputs/charts
            data/processed
